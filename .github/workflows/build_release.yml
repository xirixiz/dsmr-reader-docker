name: "DSMR: Build Docker images"

on:
  workflow_dispatch:
    inputs:
      dsmr_version:
        description: "Optional DSMR Reader version (e.g. v6.0rc10, 6.0rc9, 6.0.0). Leave empty to auto-detect."
        required: false
        default: ""
      architectures:
        description: "Target architectures (comma-separated: amd64,arm64,armv7). Leave empty for all."
        required: false
        default: ""
      skip_tests:
        description: "Skip test job (not recommended for production)"
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_TARGET_REPO: xirixiz/dsmr-reader-docker
  DOCKERFILE: Dockerfile
  DEFAULT_PLATFORMS: linux/amd64,linux/arm64,linux/arm/v7

jobs:
  build_release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      version: ${{ steps.dsmr_version.outputs.version }}
      release: ${{ steps.docker_release.outputs.release }}
      platforms: ${{ steps.docker_platforms.outputs.platforms }}
      branch: ${{ steps.branch_guard.outputs.branch }}

    steps:
      - name: "🚀 Checkout repository"
        uses: actions/checkout@v7

      - name: "🔍 Determine branch & validate inputs"
        id: branch_guard
        run: |
          BRANCH="${GITHUB_REF##*/}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          if [[ "${BRANCH}" != "development" ]]; then
            echo "use_inputs=false" >> "$GITHUB_OUTPUT"
          else
            echo "use_inputs=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "⚙️ Resolve DSMR version"
        id: dsmr_version
        run: |
          BRANCH="${{ steps.branch_guard.outputs.branch }}"
          INPUT_VERSION="${{ github.event.inputs.dsmr_version }}"
          REPO_VAR="${{ vars.DSMR_VERSION }}"
          if [[ "${BRANCH}" == "development" && -n "${INPUT_VERSION}" ]]; then
            echo "version=${INPUT_VERSION#v}" >> "$GITHUB_OUTPUT"
          elif [[ "${BRANCH}" == "development" ]]; then
            echo "version=development" >> "$GITHUB_OUTPUT"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            echo "version=${INPUT_VERSION#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${REPO_VAR}" ]]; then
            echo "version=${REPO_VAR#v}" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(curl -fsSL https://api.github.com/repos/dsmrreader/dsmr-reader/releases/latest | jq -r '.tag_name' | sed 's/^v//')"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi
          # Also set upstream for metadata
          echo "upstream=$(curl -fsSL https://api.github.com/repos/dsmrreader/dsmr-reader/releases/latest | jq -r '.tag_name')" >> "$GITHUB_OUTPUT"

      - name: "⚙️ Compute Docker release tag"
        id: docker_release
        run: |
          BRANCH="${{ steps.branch_guard.outputs.branch }}"
          if [[ "${BRANCH}" == "main" ]]; then
            REL="$(TZ=Europe/Amsterdam date +%Y%m%d).${GITHUB_RUN_NUMBER}"
          elif [[ "${BRANCH}" == "development" ]]; then
            REL="development"
          else
            REL="${BRANCH}"
          fi
          echo "release=${REL}" >> "$GITHUB_OUTPUT"
          echo "DOCKER_TARGET_RELEASE=${REL}" >> "$GITHUB_ENV"

      - name: "⚙️ Determine build platforms"
        id: docker_platforms
        run: |
          USE_INPUTS="${{ steps.branch_guard.outputs.use_inputs }}"
          INPUT="${{ github.event.inputs.architectures }}"
          if [[ "${USE_INPUTS}" != "true" || -z "${INPUT}" ]]; then
            echo "platforms=${DEFAULT_PLATFORMS}" >> "$GITHUB_OUTPUT"
          else
            PLATFORMS=""
            IFS=',' read -ra ARCHES <<< "${INPUT}"
            for ARCH in "${ARCHES[@]}"; do
              ARCH="$(echo "${ARCH}" | xargs)"
              case "${ARCH}" in
                amd64) PLATFORMS+=",linux/amd64" ;;
                arm64) PLATFORMS+=",linux/arm64" ;;
                armv7) PLATFORMS+=",linux/arm/v7" ;;
              esac
            done
            echo "platforms=${PLATFORMS#,}" >> "$GITHUB_OUTPUT"
          fi

      - name: "🏷️ Compute Docker tags"
        id: docker_tags
        run: |
          BRANCH="${{ steps.branch_guard.outputs.branch }}"
          VERSION="${{ steps.dsmr_version.outputs.version }}"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          if [[ "${BRANCH}" == "main" ]]; then
            MAJOR="$(echo "${VERSION}" | cut -d. -f1)"
            MINOR="$(echo "${VERSION}" | cut -d. -f2)"
            echo "${VERSION}"
            echo "${MAJOR}.${MINOR}"
            echo "${MAJOR}"
            echo "latest"
          elif [[ "${BRANCH}" == "development" ]]; then
            echo "development"
          else
            echo "${BRANCH}"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: "⚙️ Set up QEMU & Buildx"
        uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: "🔓 Login"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: "🔓 Login to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build timestamp
        id: build_time
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      - name: "📋 Generate Docker metadata"
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_TARGET_REPO }}
            ghcr.io/${{ env.DOCKER_TARGET_REPO }}
          tags: |
            # SemVer tags for main branch
            type=semver,pattern={{version}},value=${{ steps.dsmr_version.outputs.version }},enable=${{ steps.branch_guard.outputs.branch == 'main' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.dsmr_version.outputs.version }},enable=${{ steps.branch_guard.outputs.branch == 'main' }}
            type=semver,pattern={{major}},value=${{ steps.dsmr_version.outputs.version }},enable=${{ steps.branch_guard.outputs.branch == 'main' }}

            # Branch-specific tag for non-main branches (e.g., 'development')
            type=ref,event=branch,enable=${{ steps.branch_guard.outputs.branch != 'main' }}
          labels: |
            org.opencontainers.image.title=DSMR Reader
            org.opencontainers.image.description=DSMR Reader packaged as a multi-architecture container
            org.opencontainers.image.version=${{ steps.dsmr_version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build_time.outputs.timestamp }}
            org.opencontainers.image.licenses=MIT
            io.github.dsmrreader.upstream.version=${{ steps.dsmr_version.outputs.upstream }}
            io.github.dsmrreader.docker.release=${{ steps.docker_release.outputs.release }}

      - name: "🚀 Build and push"
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ steps.docker_platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DSMR_VERSION=${{ steps.dsmr_version.outputs.version }}
            DOCKER_TARGET_RELEASE=${{ steps.docker_release.outputs.release }}
          cache-from: type=gha
          cache-to: type=gha,mode=inline
          provenance: false

      - name: "📊 Build Summary"
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## 🎉 Docker Build Complete
          - **DSMR Version**: ${{ steps.dsmr_version.outputs.version }}
          - **Branch**: ${{ steps.branch_guard.outputs.branch }}
          - **Tags**:
          ${{ steps.meta.outputs.tags }}
          EOF

  security_scan:
    runs-on: ubuntu-latest
    needs: [build_release]
    permissions:
      packages: read
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - name: "🔍 Run Trivy vulnerability scanner"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_TARGET_REPO }}:${{ needs.build_release.outputs.branch }}
          format: 'table'
